name: Flask CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 运行测试
      run: pytest test_app.py -v
      
    - name: 构建 Docker 镜像
      run: docker build -t ${{ secrets.ALIYUN_IMAGE }}:${{ github.sha }} .
      
    - name: 登录阿里云容器镜像服务
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ALIYUN_REGISTRY }}
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}
        
    - name: 推送镜像到阿里云容器镜像服务
      run: docker push ${{ secrets.ALIYUN_IMAGE }}:${{ github.sha }}
      
    - name: 部署到 ECS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ECS_HOST }}
        username: ${{ secrets.ECS_USERNAME }}
        key: ${{ secrets.ECS_SSH_KEY }}
        port: ${{ secrets.ECS_PORT }}
        script: |
          docker login -u ${{ secrets.ALIYUN_USERNAME }} -p ${{ secrets.ALIYUN_PASSWORD }} ${{ secrets.ALIYUN_REGISTRY }}
          docker pull ${{ secrets.ALIYUN_IMAGE }}:${{ github.sha }}
          docker stop simple-web-cicd1 || true
          docker rm simple-web-cicd1 || true
          docker run -d --name simple-web-cicd1 -p 80:80 ${{ secrets.ALIYUN_IMAGE }}:${{ github.sha }}
          docker logout
